<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muro Comunitario ITB</title>
    <link rel="stylesheet" href="estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="authContainer">
        <div class="auth-card">
            <h2><i class="fas fa-users"></i> Muro Grupal</h2>
            <p>Solo personal autorizado</p>
            <input type="text" id="username" placeholder="Usuario">
            <input type="password" id="password" placeholder="Contraseña">
            <button onclick="login()">Entrar al Muro</button>
        </div>
    </div>

    <div id="appContainer" class="hidden">
        <nav>
            <span id="welcomeMsg"></span>
            <button onclick="location.reload()" class="btn-exit">Cerrar Sesión</button>
        </nav>

        <div class="input-section">
            <h3><i class="fas fa-edit"></i> Publicar para todos</h3>
            <textarea id="noteInput" placeholder="¿Qué quieres decirle al grupo?"></textarea>
            <input type="text" id="photoInput" placeholder="Enlace de la imagen (opcional)...">
            <button onclick="addNote()"><i class="fas fa-paper-plane"></i> Publicar en el Muro</button>
        </div>

        <h2 style="margin-top: 30px;">Notas de la Comunidad</h2>
        <div id="notesList" class="notes-grid">
            </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
